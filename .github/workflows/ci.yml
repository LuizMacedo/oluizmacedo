name: CI

on:
    push:
        branches: [ "**" ]
    pull_request:
        branches: [ "**" ]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        name: Validate
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run type-check

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
              env:
                  # GA4 não é obrigatório para build — se ausente, o script não é injetado
                  NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
