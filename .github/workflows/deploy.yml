name: Deploy

on:
    # Produção (main) e preview (demais branches)
    push:
        branches:
            - "**"
    # Preview por PR: abre/atualiza/fecha PR com destino main
    pull_request:
        types: [ opened, synchronize, reopened, closed ]
        branches:
            - main

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ─────────────────────────────────────────────────────────────
    # PRODUÇÃO — push na main
    # ─────────────────────────────────────────────────────────────
    deploy-production:
        name: Deploy → Production
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}

            - name: Deploy to Azure Static Web Apps (Production)
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: "out"
                  output_location: ""
                  skip_app_build: true

    # ─────────────────────────────────────────────────────────────
    # PREVIEW — push em qualquer branch que não seja main
    # ─────────────────────────────────────────────────────────────
    deploy-preview-branch:
        name: Deploy → Preview (branch)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}

            - name: Deploy to Azure Static Web Apps (Preview)
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: "out"
                  output_location: ""
                  skip_app_build: true
                  deployment_environment: ${{ github.ref_name }}

    # ─────────────────────────────────────────────────────────────
    # PREVIEW — abertura/atualização de PR
    # ─────────────────────────────────────────────────────────────
    deploy-preview-pr:
        name: Deploy → Preview (PR)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: >
            github.event_name == 'pull_request' && github.event.action !=
            'closed'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}

            - name: Deploy to Azure Static Web Apps (Preview PR)
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: "out"
                  output_location: ""
                  skip_app_build: true

    # ─────────────────────────────────────────────────────────────
    # FECHAR PREVIEW — PR fechada
    # ─────────────────────────────────────────────────────────────
    close-preview-pr:
        name: Close Preview (PR closed)
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: >
            github.event_name == 'pull_request' && github.event.action ==
            'closed'

        steps:
            - name: Close Azure Static Web Apps preview
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  action: close
